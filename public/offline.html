<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <title>София Арт офлайн</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Georgia", "Times New Roman", serif;
        background:
          radial-gradient(circle at top, rgba(228, 197, 157, 0.65), transparent 45%),
          linear-gradient(180deg, #f6f0e7 0%, #f0e2d2 100%);
        color: #171717;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        max-width: 28rem;
        padding: 24px;
        border: 1px solid rgba(23, 23, 23, 0.1);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 0 20px 40px rgba(23, 23, 23, 0.08);
      }

      h1 {
        margin-top: 0;
        font-size: 1.875rem;
      }

      p {
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 20px;
      }

      button,
      a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 16px;
        border-radius: 999px;
        border: 1px solid rgba(23, 23, 23, 0.16);
        background: #111827;
        color: #f8f3ea;
        font: inherit;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
      }

      a.button.secondary {
        background: transparent;
        color: #171717;
      }

      .status {
        margin-top: 16px;
        font-size: 0.92rem;
        color: rgba(23, 23, 23, 0.65);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>В момента сте офлайн</h1>
      <p>Обвивката на приложението е налична, но не можахме да достигнем актуалните данни за събитията.</p>
      <p>Кеширани събития от последното успешно зареждане може да са налични — опитайте отново, когато имате връзка.</p>
      <div class="actions">
        <button type="button" onclick="window.location.reload()">Опитай отново</button>
        <a class="button secondary" href="/">Към началото</a>
      </div>
      <p class="status" id="status">Проверяваме връзката…</p>
    </main>
    <script>
      const statusEl = document.getElementById('status');
      function render() {
        statusEl.textContent = navigator.onLine
          ? 'Изглежда сте онлайн. Натиснете „Опитай отново“, за да заредите данните.'
          : 'Все още сте офлайн.';
      }
      window.addEventListener('online', render);
      window.addEventListener('offline', render);
      render();
    </script>
  </body>
</html>
