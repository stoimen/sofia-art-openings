<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <title>Sofia Art Openings Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Georgia", "Times New Roman", serif;
        background:
          radial-gradient(circle at top, rgba(228, 197, 157, 0.65), transparent 45%),
          linear-gradient(180deg, #f6f0e7 0%, #f0e2d2 100%);
        color: #171717;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        max-width: 28rem;
        padding: 24px;
        border: 1px solid rgba(23, 23, 23, 0.1);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 0 20px 40px rgba(23, 23, 23, 0.08);
      }

      h1 {
        margin-top: 0;
        font-size: 1.875rem;
      }

      p {
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Offline for now</h1>
      <p>The app shell is available, but fresh event data could not be reached.</p>
      <p>Reconnect and use refresh to load the latest Sofia events.</p>
    </main>
  </body>
</html>
